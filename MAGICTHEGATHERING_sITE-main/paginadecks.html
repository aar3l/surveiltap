<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Deck</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Criar Deck</h1>
    <form id="deckForm">
        <input type="text" id="deckName" placeholder="Nome do Deck" required>
        <textarea id="deckCards" placeholder="1 NomeCarta1\n1 NomeCarta2\n1 NomeCarta3" required></textarea>
        <input type="text" id="deckColors" placeholder="Cores do Deck (ex: Azul, Vermelho)" required>
        <input type="text" id="deckAuthor" placeholder="Autor" required>
        <button type="submit">Salvar Deck</button>
    </form>
    <button onclick="viewDecks()">Ver Todos os Decks</button>

    <script>
      
    </script>
</body>
</html>
